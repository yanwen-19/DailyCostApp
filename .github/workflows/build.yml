name: 自动编译 APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 生成 Gradle Wrapper
        run: |
          cd /tmp
          mkdir -p gi
          cd gi
          echo "rootProject.name = \"t\"" > settings.gradle
          gradle wrapper --gradle-version 8.7
          # 查找 settings.gradle.kts 所在的目录
          TARGET=$(find ${{ github.workspace }} -name "settings.gradle.kts" -exec dirname {} \; | head -1)
          echo "找到项目目录: $TARGET"
          cp gradlew gradlew.bat "$TARGET/"
          cp -r gradle "$TARGET/"

      - name: 编译 Debug APK
        run: |
          # 查找并进入项目目录
          cd $(find ${{ github.workspace }} -name "settings.gradle.kts" -exec dirname {} \; | head -1)
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK 文件
        uses: actions/upload-artifact@v4
        with:
          name: 日供记账-Debug-APK
          path: ${{ github.workspace }}/app/build/outputs/apk/debug/*.apk
        # 如果上面路径找不到，试试：
        # path: ${{ github.workspace }}/**/app/build/outputs/apk/debug/*.apk
