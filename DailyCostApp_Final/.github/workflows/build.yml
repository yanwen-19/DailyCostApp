name: 自动编译 APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 生成 Gradle Wrapper
        run: |
          cd /tmp
          mkdir -p gi
          cd gi
          echo "rootProject.name = \"t\"" > settings.gradle
          gradle wrapper --gradle-version 8.7
          cp -r gradle* ${{ github.workspace }}/DailyCostApp/

      - name: 编译 Debug APK
        run: |
          cd DailyCostApp
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK 文件
        uses: actions/upload-artifact@v4
        with:
          name: 日供记账-Debug-APK
          path: DailyCostApp/app/build/outputs/apk/debug/*.apk
